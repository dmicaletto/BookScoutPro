name: Semantic Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Importante: scarica tutta la storia dei commit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Analisi dei commit per determinare il bump
      - name: Determine Version Bump
        id: bump
        run: |
          # Prova a recuperare l'ultimo tag. Se fallisce, LAST_TAG sarà vuoto.
          if ! LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null); then
            echo "No tags found. This is the first release."
            LAST_TAG=""
          else
            echo "Last tag found: '$LAST_TAG'"
          fi
          
          if [ -z "$LAST_TAG" ]; then
            # Se non ci sono tag, analizza TUTTI i commit dall'inizio
            echo "Analyzing all commits from the beginning..."
            COMMITS=$(git log --pretty=format:"%s")
            # Impostiamo una versione base fittizia per il calcolo successivo
            LAST_TAG="v0.0.0"
          else
            # Analizza i commit dall'ultimo tag a HEAD
            echo "Analyzing commits since $LAST_TAG..."
            COMMITS=$(git log $LAST_TAG..HEAD --pretty=format:"%s")
          fi
          
          # Default: nessun bump
          BUMP="none"
          
          # Logica Semantic Release semplificata (priorità: major > minor > patch)
          if echo "$COMMITS" | grep -q "BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -q "^feat"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -q "^fix"; then
            BUMP="patch"
          fi
          
          echo "Detected bump type: $BUMP"
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

      # Calcolo della nuova versione (solo se necessario)
      - name: Calculate New Version
        if: steps.bump.outputs.bump != 'none'
        id: version
        run: |
          LAST_TAG=${{ steps.bump.outputs.last_tag }}
          # Rimuove la 'v' iniziale se presente
          VERSION=${LAST_TAG#v}
          
          # Se siamo al primo rilascio (0.0.0), proviamo a leggere dal package.json
          # Se il package.json ha già una versione (es. 1.0.0), usiamo quella come base
          if [ "$VERSION" == "0.0.0" ]; then
             CURRENT_PKG_VERSION=$(node -p "require('./package.json').version")
             if [ "$CURRENT_PKG_VERSION" != "0.0.0" ]; then
                VERSION=$CURRENT_PKG_VERSION
                # Se usiamo la versione del package.json, decrementiamo la parte che verrà bumpata
                # per ottenere l'effetto desiderato (es. se è 1.0.0 e facciamo fix, vogliamo 1.0.1)
                # Tuttavia, per semplicità, se c'è già una versione manuale, la rispettiamo e applichiamo il bump su quella.
             fi
          fi

          # Divide in array [major, minor, patch]
          IFS='.' read -r -a parts <<< "$VERSION"
          MAJOR=${parts[0]}
          MINOR=${parts[1]}
          PATCH=${parts[2]}
          
          BUMP_TYPE=${{ steps.bump.outputs.bump }}
          
          if [ "$BUMP_TYPE" == "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP_TYPE" == "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif [ "$BUMP_TYPE" == "patch" ]; then
            PATCH=$((PATCH + 1))
          fi
          
          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          echo "New version calculated: $NEW_TAG"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

      # Aggiorna package.json e crea commit
      - name: Update package.json version
        if: steps.bump.outputs.bump != 'none'
        run: |
          NEW_VERSION=${{ steps.version.outputs.tag }}
          # Rimuovi la 'v' per il package.json
          CLEAN_VERSION=${NEW_VERSION#v}
          
          echo "Updating package.json to $CLEAN_VERSION"
          npm version $CLEAN_VERSION --no-git-tag-version
          
          # Configura git
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          git add package.json
          # Se esiste package-lock.json, aggiungilo
          if [ -f "package-lock.json" ]; then
            git add package-lock.json
          fi
          
          git commit -m "chore(release): bump version to $CLEAN_VERSION [skip ci]"
          git push

      # Crea la Release e il Tag su GitHub
      - name: Create Release
        if: steps.bump.outputs.bump != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
